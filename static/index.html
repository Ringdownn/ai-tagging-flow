<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>商品图片智能打标</title>
  <style>
    :root {
      --bg: #f4f6f9;
      --card: #ffffff;
      --text: #1a1d26;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --border: #e5e7eb;
      --success: #059669;
      --warning: #d97706;
      --error: #dc2626;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    header p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: var(--primary);
      background: #eff6ff;
    }

    .upload-zone input { display: none; }

    .upload-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .upload-zone p { color: var(--muted); font-size: 0.9rem; }

    .preview-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    @media (max-width: 640px) {
      .preview-row { grid-template-columns: 1fr; }
    }

    .preview-box {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: #fafafa;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-box img {
      max-width: 100%;
      max-height: 320px;
      object-fit: contain;
    }

    .preview-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }

    .btn-secondary {
      background: #f3f4f6;
      color: var(--text);
    }

    .btn-secondary:hover:not(:disabled) { background: #e5e7eb; }

    .status {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-top: 16px;
    }

    .status.loading {
      display: flex;
      background: #eff6ff;
      color: var(--primary);
    }

    .status.error {
      display: flex;
      background: #fef2f2;
      color: var(--error);
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #bfdbfe;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .badge-local { background: #d1fae5; color: #065f46; }
    .badge-glm4v { background: #dbeafe; color: #1e40af; }
    .badge-non_product { background: #fef3c7; color: #92400e; }
    .badge-error { background: #fee2e2; color: #991b1b; }
    .badge-unknown { background: #f3f4f6; color: #374151; }

    .metrics {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .metric {
      flex: 1;
      min-width: 120px;
      background: #f9fafb;
      border-radius: 8px;
      padding: 12px 16px;
    }

    .metric-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .tags-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .tag-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
    }

    .tag-key {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .tag-value {
      font-size: 0.95rem;
      font-weight: 600;
      word-break: break-word;
    }

    .hidden { display: none !important; }

    .empty-hint {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 40px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>商品图片智能打标</h1>
      <p>上传商品主图，自动识别类目、颜色、材质等标签</p>
    </header>

    <div class="card">
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*" />
        <div class="upload-icon">📷</div>
        <p><strong>点击或拖拽图片到此处</strong></p>
        <p>支持 JPG、PNG、WEBP，最大 10MB</p>
      </div>

      <div class="preview-row hidden" id="previewRow">
        <div>
          <div class="preview-label">原图预览</div>
          <div class="preview-box">
            <img id="previewImg" alt="预览" />
          </div>
        </div>
        <div>
          <div class="preview-label">图片信息</div>
          <div class="preview-box" style="flex-direction: column; padding: 20px; align-items: flex-start;">
            <p id="fileName" style="font-weight: 600; margin-bottom: 8px;"></p>
            <p id="fileSize" style="color: var(--muted); font-size: 0.9rem;"></p>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="submitBtn" disabled>开始打标</button>
        <button class="btn-secondary" id="clearBtn" disabled>清除</button>
      </div>

      <div class="status" id="statusBox">
        <div class="spinner" id="spinner"></div>
        <span id="statusText"></span>
      </div>
    </div>

    <div class="card hidden" id="resultCard">
      <div class="result-header">
        <h2 style="font-size: 1.15rem;">识别结果</h2>
        <span class="badge" id="branchBadge"></span>
      </div>

      <div class="metrics" id="metrics"></div>
      <div class="tags-grid" id="tagsGrid"></div>
    </div>
  </div>

  <script>
    const uploadZone = document.getElementById("uploadZone");
    const fileInput = document.getElementById("fileInput");
    const previewRow = document.getElementById("previewRow");
    const previewImg = document.getElementById("previewImg");
    const fileName = document.getElementById("fileName");
    const fileSize = document.getElementById("fileSize");
    const submitBtn = document.getElementById("submitBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusBox = document.getElementById("statusBox");
    const statusText = document.getElementById("statusText");
    const spinner = document.getElementById("spinner");
    const resultCard = document.getElementById("resultCard");
    const branchBadge = document.getElementById("branchBadge");
    const metrics = document.getElementById("metrics");
    const tagsGrid = document.getElementById("tagsGrid");

    let selectedFile = null;

    const BRANCH_LABELS = {
      local: "本地模型",
      glm4v: "GLM-4V 疑难图",
      non_product: "非商品图",
      error: "处理失败",
      unknown: "未知",
    };

    const TAG_FIELDS = ["类目", "颜色", "材质/面料", "款式特征", "成色", "置信度", "复杂度"];

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(1) + " MB";
    }

    function formatValue(value) {
      if (Array.isArray(value)) return value.join("、") || "未知";
      if (typeof value === "number") return value.toFixed(2);
      return value ?? "未知";
    }

    function setLoading(loading, message = "") {
      statusBox.className = "status" + (loading ? " loading" : "");
      statusText.textContent = message;
      spinner.style.display = loading ? "block" : "none";
      submitBtn.disabled = loading || !selectedFile;
      clearBtn.disabled = loading || !selectedFile;
    }

    function showError(message) {
      statusBox.className = "status error";
      statusText.textContent = message;
      spinner.style.display = "none";
    }

    function handleFile(file) {
      if (!file || !file.type.startsWith("image/")) {
        showError("请选择有效的图片文件");
        return;
      }
      if (file.size > 10 * 1024 * 1024) {
        showError("图片大小不能超过 10MB");
        return;
      }

      selectedFile = file;
      previewImg.src = URL.createObjectURL(file);
      fileName.textContent = file.name;
      fileSize.textContent = formatBytes(file.size);
      previewRow.classList.remove("hidden");
      submitBtn.disabled = false;
      clearBtn.disabled = false;
      statusBox.className = "status";
      resultCard.classList.add("hidden");
    }

    uploadZone.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (e) => handleFile(e.target.files[0]));

    uploadZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      uploadZone.classList.add("dragover");
    });
    uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("dragover"));
    uploadZone.addEventListener("drop", (e) => {
      e.preventDefault();
      uploadZone.classList.remove("dragover");
      handleFile(e.dataTransfer.files[0]);
    });

    clearBtn.addEventListener("click", () => {
      selectedFile = null;
      fileInput.value = "";
      previewImg.src = "";
      previewRow.classList.add("hidden");
      resultCard.classList.add("hidden");
      statusBox.className = "status";
      submitBtn.disabled = true;
      clearBtn.disabled = true;
    });

    function renderResult(data) {
      const branch = data.branch || "unknown";
      branchBadge.textContent = BRANCH_LABELS[branch] || branch;
      branchBadge.className = "badge badge-" + (BRANCH_LABELS[branch] ? branch : "unknown");

      metrics.innerHTML = `
        <div class="metric">
          <div class="metric-label">置信度</div>
          <div class="metric-value">${(data.confidence ?? 0).toFixed(2)}</div>
        </div>
        <div class="metric">
          <div class="metric-label">复杂度</div>
          <div class="metric-value">${(data.complexity ?? 0).toFixed(2)}</div>
        </div>
        <div class="metric">
          <div class="metric-label">是否商品</div>
          <div class="metric-value">${data.is_product ? "是" : "否"}</div>
        </div>
      `;

      const tags = data.tags || {};
      tagsGrid.innerHTML = TAG_FIELDS.map((key) => `
        <div class="tag-item">
          <div class="tag-key">${key}</div>
          <div class="tag-value">${formatValue(tags[key])}</div>
        </div>
      `).join("");

      resultCard.classList.remove("hidden");
    }

    submitBtn.addEventListener("click", async () => {
      if (!selectedFile) return;

      setLoading(true, "正在分析图片，请稍候…（首次加载模型可能较慢）");

      const formData = new FormData();
      formData.append("file", selectedFile);

      try {
        const resp = await fetch("/tag/upload", { method: "POST", body: formData });
        const data = await resp.json();

        if (!resp.ok) {
          throw new Error(data.detail || "打标请求失败");
        }

        setLoading(false);
        renderResult(data);
      } catch (err) {
        showError(err.message || "打标失败，请稍后重试");
        submitBtn.disabled = false;
        clearBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
