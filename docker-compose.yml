services:
  remove-bg:
    build:
      context: .
      dockerfile: docker/Dockerfile.remove_bg
    image: ai-tagging-flow/remove-bg:latest
    container_name: ai-tagging-remove-bg
    ports:
      - "8001:8001"
    volumes:
      - ./models:/app/models:ro
    environment:
      RMBG_ONNX_MODEL: ${RMBG_ONNX_MODEL:-model_int8.onnx}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  detect-crop:
    build:
      context: .
      dockerfile: docker/Dockerfile.detect_crop
    image: ai-tagging-flow/detect-crop:latest
    container_name: ai-tagging-detect-crop
    ports:
      - "8002:8002"
    volumes:
      - ./models:/app/models:ro
    environment:
      YOLO_DEVICE: ${YOLO_DEVICE:-cpu}
      YOLO_CONFIDENCE_THRESHOLD: ${YOLO_CONFIDENCE_THRESHOLD:-0.4}
      YOLO_IOU_THRESHOLD: ${YOLO_IOU_THRESHOLD:-0.5}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

  orchestration:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestration
    image: ai-tagging-flow/orchestration:latest
    container_name: ai-tagging-orchestration
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./temp:/app/temp
    environment:
      REMOVE_BG_URL: http://remove-bg:8001
      DETECT_CROP_URL: http://detect-crop:8002
      LOCAL_VLM_PATH: ${LOCAL_VLM_PATH:-/app/models/qwen2.5-vl-7b-merge}
      LOCAL_VLM_DEVICE: ${LOCAL_VLM_DEVICE:-auto}
      LOCAL_VLM_DTYPE: ${LOCAL_VLM_DTYPE:-auto}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.75}
      COMPLEXITY_THRESHOLD: ${COMPLEXITY_THRESHOLD:-0.5}
      MULTI_OBJECT_MODE: ${MULTI_OBJECT_MODE:-false}
      TOOL_TIMEOUT: ${TOOL_TIMEOUT:-30}
    depends_on:
      remove-bg:
        condition: service_healthy
      detect-crop:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
